name: Process photo batch

on:
  workflow_dispatch:
    inputs:
      items_json:
        description: JSON array with rows and source URLs
        required: true
        type: string

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install sharp

      - name: Process images
        env:
          ITEMS_JSON: ${{ github.event.inputs.items_json }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          CALLBACK_SHARED_SECRET: ${{ secrets.CALLBACK_SHARED_SECRET }}
          REPO_OUTPUT_DIR: photos
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: node scripts/process-photo-batch.cjs

      - name: Commit processed images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photos
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Add processed coffee photos"
          git push
