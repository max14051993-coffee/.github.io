name: Process Photo

on:
  workflow_dispatch:
    inputs:
      row_number:
        description: "Row number in Google Sheet"
        required: true
        type: string
      photo_url:
        description: "Source photo URL"
        required: true
        type: string

jobs:
  process-photo:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-save sharp

      - name: Process image
        env:
          ROW_NUMBER: ${{ inputs.row_number }}
          PHOTO_URL: ${{ inputs.photo_url }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          CALLBACK_SHARED_SECRET: ${{ secrets.CALLBACK_SHARED_SECRET }}
          PUBLIC_PHOTO_BASE_URL: ${{ secrets.PUBLIC_PHOTO_BASE_URL }}
        run: node scripts/process-photo.cjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add photos
          git diff --cached --quiet && exit 0
          git commit -m "Add processed photo for row ${{ inputs.row_number }}"

          git pull --rebase --autostash origin main
          git push origin main
